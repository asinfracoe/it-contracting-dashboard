name: Extract Quotes & Update Dashboard

on:
  push:
    paths:
      - 'quotes/**'
      - 'extractor/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.G_TOKEN }}
          persist-credentials: true
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r extractor/requirements.txt
      
      - name: Run extractor
        env:
          LLAMA_API_KEY: ${{ secrets.LLAMA_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python extractor/main.py
      
      - name: Commit and push catalog_data.json
        env:
          G_TOKEN: ${{ secrets.G_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${G_TOKEN}@github.com/${{ github.repository }}.git
          git add catalog_data.json
          if git diff --staged --quiet; then
            echo "ℹ️ No changes to commit"
          else
            git commit -m "🤖 Auto-update catalog from quotes [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
            echo "✅ Pushed catalog_data.json update"
          fi
