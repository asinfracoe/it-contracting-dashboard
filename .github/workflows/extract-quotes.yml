name: Extract Quotes & Update Dashboard

on:
  push:
    paths:
      - 'quotes/**'
      - 'extractor/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.G_TOKEN }}
          persist-credentials: true
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r extractor/requirements.txt
      
      - name: Run extractor (multi-LLM fallback)
        id: extract
        continue-on-error: true   # ← CRITICAL: don't fail the job on rate limit
        env:
          LLAMA_API_KEY: ${{ secrets.LLAMA_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: python extractor/main.py
      
      - name: Commit and push catalog_data.json
        if: always()   # ← CRITICAL: run even if extractor failed
        env:
          G_TOKEN: ${{ secrets.G_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${G_TOKEN}@github.com/${{ github.repository }}.git
          git add catalog_data.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "ℹ️ No changes to catalog_data.json"
          else
            COUNT=$(python -c "import json; print(len(json.load(open('catalog_data.json'))))" 2>/dev/null || echo "?")
            git commit -m "🤖 Auto-update catalog: $COUNT records [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
            echo "✅ Pushed catalog with $COUNT records"
          fi
      
      - name: Report extraction status
        if: always()
        run: |
          if [ "${{ steps.extract.outcome }}" == "failure" ]; then
            echo "⚠️ Extractor exited with errors — partial progress was committed"
            exit 0   # Don't fail the workflow
          else
            echo "✅ Extraction completed successfully"
          fi
